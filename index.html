    function generateCards() {
        const container = document.getElementById('cardsContainer');
        if (!container) return;
        container.innerHTML = '';
        
        sitesData.forEach((item, idx) => {
            const card = document.createElement('article');
            card.className = 'resource-card';
            card.id = `card-${idx}`;
            card.setAttribute('aria-label', `網站卡片：${item.title}`);
            const featuresHtml = item.features.map(f => `<li>${escapeHtml(f)}</li>`).join('');
            let cardInnerHtml = `<div class="card-content"><div class="card-icon">${item.icon || '🔖'}</div><div class="badge-category">${escapeHtml(item.category)}</div><div class="site-title"><a href="${item.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a></div><div class="description">${escapeHtml(item.description)}</div><ul class="feature-list">${featuresHtml}</ul><div class="card-footer"><a href="${item.url}" target="_blank" rel="noopener noreferrer" class="visit-link">前往探索 <span>→</span></a></div>`;
            if (item.showDevDate) {
                let dateLabel = "📅 2026/04/07";
                if (["AI 工具入口 · 一站式 AI 服務導航", "營養AI衛教研究", "AI深度研究音樂與生理狀態的相互影響"].includes(item.title)) dateLabel = "📅 2026/04/08";
                if (["頂級機密 AI 互動協議設計研究", "AI安全決策樹 · 風險評估框架"].includes(item.title)) dateLabel = "📅 2026/04/09";
                if (item.title === "NotebookLM 結構化提示工程研究" || item.title === "企業 AI 紅隊測試框架") dateLabel = "📅 2026/04/10";
                cardInnerHtml += `<div class="dev-date">${dateLabel}</div>`;
            }
            cardInnerHtml += `</div>`;
            card.innerHTML = cardInnerHtml;
            container.appendChild(card);
        });
    }
    
    function generateQuickLinks() {
        const container = document.getElementById('quickLinksContainer');
        if (!container) return;
        container.innerHTML = '';
        const groupOrder = [{ key: "創作與工具", label: "🎨 創作與工具" }, { key: "研究報告", label: "📄 研究報告" }, { key: "平台與對話", label: "💬 平台與對話" }];
        const groups = {};
        sitesData.forEach((item, idx) => { const g = item.group || "其他"; if (!groups[g]) groups[g] = []; groups[g].push({ ...item, originalIndex: idx }); });
        groupOrder.forEach(groupInfo => {
            const items = groups[groupInfo.key];
            if (!items || items.length === 0) return;
            const groupDiv = document.createElement('div'); groupDiv.className = 'link-group';
            const titleDiv = document.createElement('div'); titleDiv.className = 'link-group-title'; titleDiv.textContent = groupInfo.label; groupDiv.appendChild(titleDiv);
            const buttonsDiv = document.createElement('div'); buttonsDiv.className = 'link-buttons';
            items.forEach(item => {
                const btn = document.createElement('button'); btn.textContent = item.title; btn.className = 'quick-link-btn'; btn.setAttribute('data-target-idx', item.originalIndex);
                btn.addEventListener('click', (e) => { e.preventDefault(); const targetCard = document.getElementById(`card-${item.originalIndex}`); if (targetCard) { targetCard.scrollIntoView({ behavior: 'smooth', block: 'start' }); targetCard.style.transition = 'box-shadow 0.2s'; targetCard.style.boxShadow = '0 0 0 3px #2b8fae'; setTimeout(() => { targetCard.style.boxShadow = ''; }, 1000); } });
                buttonsDiv.appendChild(btn);
            });
            groupDiv.appendChild(buttonsDiv); container.appendChild(groupDiv);
        });
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    
    function initBackToTop() { const backBtn = document.getElementById('backToTopBtn'); if (backBtn) backBtn.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); }); }
    
    // 站內即時過濾功能：根據輸入關鍵字篩選卡片，比對標題、描述、特色列表文字
    function initInstantFilter() {
        const searchInput = document.getElementById('searchInput');
        const cardsContainer = document.getElementById('cardsContainer');
        if (!searchInput || !cardsContainer) return;
        
        const filterCards = () => {
            const keyword = searchInput.value.trim().toLowerCase();
            const cards = document.querySelectorAll('.resource-card');
            let matchCount = 0;
            
            cards.forEach(card => {
                // 取得卡片內所有可搜尋文字：標題連結文字、描述、特色列表文字
                const titleElem = card.querySelector('.site-title a');
                const descElem = card.querySelector('.description');
                const featureItems = card.querySelectorAll('.feature-list li');
                
                let textContent = '';
                if (titleElem) textContent += titleElem.textContent + ' ';
                if (descElem) textContent += descElem.textContent + ' ';
                featureItems.forEach(item => { textContent += item.textContent + ' '; });
                
                const matches = keyword === '' || textContent.toLowerCase().includes(keyword);
                if (matches) {
                    card.style.display = '';
                    matchCount++;
                } else {
                    card.style.display = 'none';
                }
            });
            
            // 處理無結果提示
            let noResultDiv = document.getElementById('noResultMessage');
            if (!noResultDiv) {
                noResultDiv = document.createElement('div');
                noResultDiv.id = 'noResultMessage';
                noResultDiv.className = 'no-results';
                cardsContainer.parentNode.insertBefore(noResultDiv, cardsContainer.nextSibling);
            }
            if (matchCount === 0 && keyword !== '') {
                noResultDiv.textContent = '🔍 沒有找到與「' + escapeHtml(keyword) + '」相關的資源，請嘗試其他關鍵字。';
                noResultDiv.style.display = 'block';
            } else {
                noResultDiv.style.display = 'none';
            }
        };
        
        searchInput.addEventListener('input', filterCards);
        // 初始執行一次確保無結果區塊隱藏
        filterCards();
    }
    
    function initExternalSearch() {
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        const performExternalSearch = () => {
            let query = searchInput.value.trim();
            if (query === "") return;
            let hostname = window.location.hostname;
            const siteQuery = `site:${hostname}`;
            const finalQuery = `${query} ${siteQuery}`;
            const googleUrl = `https://www.google.com/search?q=${encodeURIComponent(finalQuery)}`;
            window.open(googleUrl, '_blank');
        };
        searchBtn.addEventListener('click', performExternalSearch);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performExternalSearch(); });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        generateCards();
        generateQuickLinks();
        initBackToTop();
        initInstantFilter();   // 站內即時過濾
        initExternalSearch();  // Google 站外搜尋
    });
</script>
