        { title: "AI時代下的實體書價值與未來", shortTitle: "實體書價值與未來", url: "https://s8762999999-design.github.io/LLM-VS-BOOKS-Knowledge-structure-gemini/", description: "在生成式人工智慧（Generative AI）與大型語言模型（Large Language Models, LLMs）引發技術典範轉移的當下，人類社會獲取、處理與內化知識的底層邏輯正經歷前所未有的劇變。當 ChatGPT、Claude 或 Gemini 等智慧代理能夠在毫秒之間，從海量數據中萃取、合成並產出高度客製化的結構化摘要時，傳統實體「知識型書籍」的不可替代性受到了嚴峻的質疑。對於現代學習者與專業人士而言，面對極低獲取成本與極高便利性的 AI 生成內容，花費數天甚至數週閱讀一本數百頁的實體書，似乎已成為一種效率低下的知識獲取手段。", features: ["知識取得模式的變化", "無法完全取代的面向", "結論與未來預測"], icon: "📚🤖", category: "🔧 開發輔助", group: "研究報告", showDevDate: true },

    function expandKeywords(keyword) {
        let expanded = new Set();
        let lowerKeyword = keyword.toLowerCase();
        expanded.add(lowerKeyword);
        for (let [key, synonyms] of Object.entries(synonymMap)) {
            if (lowerKeyword === key || lowerKeyword.includes(key) || synonyms.some(s => lowerKeyword.includes(s))) {
                expanded.add(key);
                synonyms.forEach(s => expanded.add(s.toLowerCase()));
            }
        }
        const words = lowerKeyword.split(/\s+/);
        words.forEach(w => {
            if (w.length > 1) expanded.add(w);
            for (let [key, synonyms] of Object.entries(synonymMap)) {
                if (w === key || synonyms.some(s => w === s)) {
                    expanded.add(key);
                    synonyms.forEach(s => expanded.add(s.toLowerCase()));
                }
            }
        });
        return Array.from(expanded);
    }

    function filterCardsWithAI(keyword) {
        const expandedKeywords = expandKeywords(keyword);

        let matchCount = 0;
        cards.forEach(card => {
            const titleElem = card.querySelector('.site-title a');
            const descElem = card.querySelector('.description');
            const featureItems = card.querySelectorAll('.feature-list li');
            let textContent = '';
            if (titleElem) textContent += titleElem.textContent + ' ';
            if (descElem) textContent += descElem.textContent + ' ';
            featureItems.forEach(item => { textContent += item.textContent + ' '; });
            const lowerText = textContent.toLowerCase();
            const matched = expandedKeywords.some(kw => lowerText.includes(kw));
            if (matched) {
                card.style.display = '';
                matchCount++;
            } else {
                card.style.display = 'none';
            }
        });
        let noResultDiv = document.getElementById('noResultMessage');
        if (!noResultDiv) {
            noResultDiv = document.createElement('div');
            noResultDiv.id = 'noResultMessage';
            noResultDiv.className = 'no-results';
            document.getElementById('cardsContainer').parentNode.insertBefore(noResultDiv, document.getElementById('cardsContainer').nextSibling);
        }
        if (matchCount === 0 && keyword.trim() !== '') {
            noResultDiv.textContent = '🤖 Google AI 未找到與「' + escapeHtml(keyword) + '」相關的資源，請嘗試其他關鍵字。';
            noResultDiv.style.display = 'block';

        } else {
            noResultDiv.style.display = 'none';
        }
    }

                else { card.style.display = 'none'; }
            });
            let noResultDiv = document.getElementById('noResultMessage');
            if (!noResultDiv) {
                noResultDiv = document.createElement('div');
                noResultDiv.id = 'noResultMessage';
                noResultDiv.className = 'no-results';
                cardsContainer.parentNode.insertBefore(noResultDiv, cardsContainer.nextSibling);
            }
            if (matchCount === 0 && keyword !== '') {
                noResultDiv.textContent = '🔍 沒有找到與「' + escapeHtml(keyword) + '」相關的資源，請嘗試其他關鍵字。';
                noResultDiv.style.display = 'block';
            } else {
                noResultDiv.style.display = 'none';
            }
        };
        searchInput.addEventListener('input', filterCards);
        filterCards();
    }
    
    function initExternalSearch() {
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        const performExternalSearch = () => {
            let query = searchInput.value.trim();
            if (query === "") {
                alert("請輸入要搜尋的關鍵字，將搜尋整個 s8762999999-design.github.io 網站");
                return;
            }
            const siteDomain = "s8762999999-design.github.io";
            const finalQuery = `${query} site:${siteDomain}`;
            const googleUrl = `https://www.google.com/search?q=${encodeURIComponent(finalQuery)}`;
            window.open(googleUrl, '_blank');
        };
        searchBtn.addEventListener('click', performExternalSearch);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performExternalSearch(); });
    }
    
    function initAIRecommend() {
        const aiBtn = document.getElementById('aiRecommendBtn');
        const searchInput = document.getElementById('searchInput');
        aiBtn.addEventListener('click', () => {
            const keyword = searchInput.value.trim();
            if (keyword === "") {
                alert("請先輸入關鍵字，再使用 Google AI 智慧推薦");
                return;
            }
            filterCardsWithAI(keyword);
        });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        generateCards();
        generateQuickLinks();
        initBackToTop();
        initInstantFilter();
        initExternalSearch();
        initAIRecommend();
    });
</script>
</body>
</html>
