    function expandKeywords(keyword) {
        let expanded = new Set();
        let lowerKeyword = keyword.toLowerCase();
        expanded.add(lowerKeyword);
        for (let [key, synonyms] of Object.entries(synonymMap)) {
            if (lowerKeyword === key || lowerKeyword.includes(key) || synonyms.some(s => lowerKeyword.includes(s))) {
                expanded.add(key);
                synonyms.forEach(s => expanded.add(s.toLowerCase()));
            }
        }
        const words = lowerKeyword.split(/\s+/);
        words.forEach(w => {
            if (w.length > 1) expanded.add(w);
            for (let [key, synonyms] of Object.entries(synonymMap)) {
                if (w === key || synonyms.some(s => w === s)) {
                    expanded.add(key);
                    synonyms.forEach(s => expanded.add(s.toLowerCase()));
                }
            }
        });
        return Array.from(expanded);
    }

    function filterCardsWithAI(keyword) {
        const expandedKeywords = expandKeywords(keyword);
        const cards = document.querySelectorAll('.resource-card');
        let matchCount = 0;
        cards.forEach(card => {
            const titleElem = card.querySelector('.site-title a');
            const descElem = card.querySelector('.description');
            const featureItems = card.querySelectorAll('.feature-list li');
            let textContent = '';
            if (titleElem) textContent += titleElem.textContent + ' ';
            if (descElem) textContent += descElem.textContent + ' ';
            featureItems.forEach(item => { textContent += item.textContent + ' '; });
            const lowerText = textContent.toLowerCase();
            const matched = expandedKeywords.some(kw => lowerText.includes(kw));
            if (matched) {
                card.style.display = '';
                matchCount++;
            } else {
                card.style.display = 'none';
            }
        });
        let noResultDiv = document.getElementById('noResultMessage');
        if (!noResultDiv) {
            noResultDiv = document.createElement('div');
            noResultDiv.id = 'noResultMessage';
            noResultDiv.className = 'no-results';
            document.getElementById('cardsContainer').parentNode.insertBefore(noResultDiv, document.getElementById('cardsContainer').nextSibling);
        }
        if (matchCount === 0 && keyword.trim() !== '') {
            noResultDiv.textContent = '🤖 Google AI 未找到與「' + escapeHtml(keyword) + '」相關的資源，請嘗試其他關鍵字。';
            noResultDiv.style.display = 'block';
        } else if (keyword.trim() !== '') {
            noResultDiv.textContent = `✨ Google AI 推薦找到 ${matchCount} 篇相關文章 (基於同義詞擴充)`;
            noResultDiv.style.display = 'block';
        } else {
            noResultDiv.style.display = 'none';
        }
    }

        container.innerHTML = '';
        
        sitesData.forEach((item, idx) => {
            const card = document.createElement('article');

            card.setAttribute('aria-label', `網站卡片：${item.title}`);
            const featuresHtml = item.features.map(f => `<li>${escapeHtml(f)}</li>`).join('');
            let cardInnerHtml = `<div class="card-content"><div class="card-icon">${item.icon || '🔖'}</div><div class="badge-category">${escapeHtml(item.category)}</div><div class="site-title"><a href="${item.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a></div><div class="description">${escapeHtml(item.description)}</div><ul class="feature-list">${featuresHtml}</ul><div class="card-footer"><a href="${item.url}" target="_blank" rel="noopener noreferrer" class="visit-link">前往探索 <span>→</span></a></div>`;
            if (item.showDevDate) {
                let dateLabel = "📅 2026/04/07";
                if (["AI 工具入口 · 一站式 AI 服務導航", "營養AI衛教研究", "AI深度研究音樂與生理狀態的相互影響"].includes(item.title)) dateLabel = "📅 2026/04/08";
                if (["頂級機密 AI 互動協議設計研究", "AI安全決策樹 · 風險評估框架"].includes(item.title)) dateLabel = "📅 2026/04/09";
                if (item.title === "NotebookLM 結構化提示工程研究" || item.title === "企業 AI 紅隊測試框架" || item.title === "敏感資料去識別化系統 v4.1") dateLabel = "📅 2026/04/10";
                if (item.title === "AI 任務轉移提示工程研究" || item.title === "NIU 生物資源在職碩士面試策略研究" || item.title === "電子系統可靠性研究") dateLabel = "📅 2026/04/11";
                if (item.title === "NIU 面試策略儀表板" || item.title === "EBM 健康資訊解碼器" || item.title === "健康資訊解碼器 v3" || item.title === "微胖男性穿搭指南" || item.title === "AI 資深 vs 初階 · 技能差異研究" || item.title === "UI/UX 學習全攻略 · 設計與研究資源") dateLabel = "📅 2026/04/12";
                if (item.title === "從測試邏輯到萬用思維") dateLabel = "📅 2026/04/13";
                cardInnerHtml += `<div class="dev-date">${dateLabel}</div>`;
            }
            cardInnerHtml += `</div>`;
            card.innerHTML = cardInnerHtml;
            container.appendChild(card);
        });
    }
    
    function generateQuickLinks() {
        const container = document.getElementById('quickLinksContainer');
        if (!container) return;
        container.innerHTML = '';
        const groupOrder = [
            { key: "創作與工具", label: "🎨 創作與工具" },
            { key: "研究報告", label: "📄 研究報告" },
            { key: "平台與對話", label: "💬 平台與對話" }
        ];
        const groups = {};
        sitesData.forEach((item, idx) => {
            const g = item.group || "其他";
            if (!groups[g]) groups[g] = [];
            groups[g].push({ ...item, originalIndex: idx });
        });
        groupOrder.forEach(groupInfo => {
            const items = groups[groupInfo.key];
            if (!items || items.length === 0) return;
            const groupDiv = document.createElement('div'); groupDiv.className = 'link-group';
            const titleDiv = document.createElement('div'); titleDiv.className = 'link-group-title'; titleDiv.textContent = groupInfo.label; groupDiv.appendChild(titleDiv);
            const buttonsDiv = document.createElement('div'); buttonsDiv.className = 'link-buttons';
            items.forEach(item => {
                const btn = document.createElement('button');
                btn.textContent = item.shortTitle || item.title;
                btn.className = 'quick-link-btn';
                btn.setAttribute('data-target-idx', item.originalIndex);
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetCard = document.getElementById(`card-${item.originalIndex}`);
                    if (targetCard) {
                        targetCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        targetCard.style.transition = 'box-shadow 0.2s';
                        targetCard.style.boxShadow = '0 0 0 3px #2b8fae';
                        setTimeout(() => { targetCard.style.boxShadow = ''; }, 1000);
                    }
                });
                buttonsDiv.appendChild(btn);
            });
            groupDiv.appendChild(buttonsDiv); container.appendChild(groupDiv);
        });
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    
    function initBackToTop() { const backBtn = document.getElementById('backToTopBtn'); if (backBtn) backBtn.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); }); }
    
    function initInstantFilter() {
        const searchInput = document.getElementById('searchInput');
        const cardsContainer = document.getElementById('cardsContainer');
        if (!searchInput || !cardsContainer) return;
        const filterCards = () => {
            const keyword = searchInput.value.trim().toLowerCase();
            const cards = document.querySelectorAll('.resource-card');
            let matchCount = 0;
            cards.forEach(card => {
                const titleElem = card.querySelector('.site-title a');
                const descElem = card.querySelector('.description');
                const featureItems = card.querySelectorAll('.feature-list li');
                let textContent = '';
                if (titleElem) textContent += titleElem.textContent + ' ';
                if (descElem) textContent += descElem.textContent + ' ';
                featureItems.forEach(item => { textContent += item.textContent + ' '; });
                const matches = keyword === '' || textContent.toLowerCase().includes(keyword);
                if (matches) { card.style.display = ''; matchCount++; } 
                else { card.style.display = 'none'; }
            });
            let noResultDiv = document.getElementById('noResultMessage');
            if (!noResultDiv) {
                noResultDiv = document.createElement('div');
                noResultDiv.id = 'noResultMessage';
                noResultDiv.className = 'no-results';
                cardsContainer.parentNode.insertBefore(noResultDiv, cardsContainer.nextSibling);
            }
            if (matchCount === 0 && keyword !== '') {
                noResultDiv.textContent = '🔍 沒有找到與「' + escapeHtml(keyword) + '」相關的資源，請嘗試其他關鍵字。';
                noResultDiv.style.display = 'block';
            } else {
                noResultDiv.style.display = 'none';
            }
        };
        searchInput.addEventListener('input', filterCards);
        filterCards();
    }
    
    function initExternalSearch() {
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        const performExternalSearch = () => {
            let query = searchInput.value.trim();
            if (query === "") {
                alert("請輸入要搜尋的關鍵字，將搜尋整個 s8762999999-design.github.io 網站");
                return;
            }
            const siteDomain = "s8762999999-design.github.io";
            const finalQuery = `${query} site:${siteDomain}`;
            const googleUrl = `https://www.google.com/search?q=${encodeURIComponent(finalQuery)}`;
            window.open(googleUrl, '_blank');
        };
        searchBtn.addEventListener('click', performExternalSearch);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performExternalSearch(); });
    }
    
    function initAIRecommend() {
        const aiBtn = document.getElementById('aiRecommendBtn');
        const searchInput = document.getElementById('searchInput');
        aiBtn.addEventListener('click', () => {
            const keyword = searchInput.value.trim();
            if (keyword === "") {
                alert("請先輸入關鍵字，再使用 Google AI 智慧推薦");
                return;
            }
            filterCardsWithAI(keyword);
        });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        generateCards();
        generateQuickLinks();
        initBackToTop();
        initInstantFilter();
        initExternalSearch();
        initAIRecommend();
    });
</script>
</body>
